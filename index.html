<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asme — Know it all</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ["'Instrument Serif'", 'serif'] }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/framer-motion@11.18.2/dist/framer-motion.js"></script>
  <!-- lucide icons inlined as SVG components -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; }

    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.15) 20%,
        rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%,
        rgba(255,255,255,0.15) 80%,
        rgba(255,255,255,0.45) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    input, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useEffect, useState } = React;
    const { motion, useInView } = window.Motion;

    // Inline SVG icons
    const Globe = ({size=24,color="currentColor"}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
    );
    const ArrowRight = ({size=24,color="currentColor"}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>
    );
    const ArrowUpRight = ({size=24,color="currentColor"}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
      </svg>
    );
    const Instagram = ({size=24,color="currentColor"}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
    );
    const Twitter = ({size=24,color="currentColor"}) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/>
      </svg>
    );

    /* ─────────────── HERO ─────────────── */
    function Hero() {
      const videoRef = useRef(null);

      useEffect(() => {
        const video = videoRef.current;
        if (!video) return;
        video.style.opacity = 0;

        let fadeOutStarted = false;
        let animFrames = [];

        function rAF(cb) {
          const id = requestAnimationFrame(cb);
          animFrames.push(id);
          return id;
        }

        function fadeToOpacity(from, to, duration, onDone) {
          let start = null;
          function step(ts) {
            if (!start) start = ts;
            const p = Math.min((ts - start) / duration, 1);
            video.style.opacity = from + (to - from) * p;
            if (p < 1) rAF(step);
            else onDone && onDone();
          }
          rAF(step);
        }

        function handleCanPlay() {
          video.play().catch(() => {});
          fadeToOpacity(0, 1, 500);
        }

        function handleTimeUpdate() {
          if (!video.duration) return;
          const remaining = video.duration - video.currentTime;
          if (remaining <= 0.55 && !fadeOutStarted) {
            fadeOutStarted = true;
            const cur = parseFloat(video.style.opacity) || 1;
            fadeToOpacity(cur, 0, 500);
          }
        }

        function handleEnded() {
          fadeOutStarted = false;
          video.style.opacity = 0;
          setTimeout(() => {
            video.currentTime = 0;
            video.play().catch(() => {});
            fadeToOpacity(0, 1, 500);
          }, 100);
        }

        video.addEventListener('canplay', handleCanPlay);
        video.addEventListener('timeupdate', handleTimeUpdate);
        video.addEventListener('ended', handleEnded);
        return () => {
          animFrames.forEach(cancelAnimationFrame);
          video.removeEventListener('canplay', handleCanPlay);
          video.removeEventListener('timeupdate', handleTimeUpdate);
          video.removeEventListener('ended', handleEnded);
        };
      }, []);

      return (
        <div className="relative min-h-screen flex flex-col overflow-hidden">
          {/* BG video */}
          <video
            ref={videoRef}
            src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260405_074625_a81f018a-956b-43fb-9aee-4d1508e30e6a.mp4"
            className="absolute inset-0 w-full h-full object-cover object-bottom"
            muted
            autoPlay
            playsInline
            preload="auto"
            style={{ opacity: 0 }}
          />

          {/* Navbar */}
          <nav className="relative z-20 px-6 py-6">
            <div className="liquid-glass rounded-full max-w-5xl mx-auto px-6 py-3 flex items-center justify-between">
              <div className="flex items-center">
                <Globe size={24} color="white" />
                <span className="text-white font-semibold text-lg ml-2">Asme</span>
                <div className="hidden md:flex items-center gap-8 ml-8">
                  {['Features','Pricing','About'].map(l => (
                    <a key={l} href="#" className="text-white/80 hover:text-white text-sm font-medium transition-colors" style={{textDecoration:'none'}}>{l}</a>
                  ))}
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button style={{background:'none',border:'none',cursor:'pointer',color:'white',fontSize:'0.875rem',fontWeight:500}}>Sign Up</button>
                <button className="liquid-glass rounded-full px-6 py-2 text-white text-sm font-medium" style={{border:'none',cursor:'pointer',color:'white'}}>Login</button>
              </div>
            </div>
          </nav>

          {/* Hero content */}
          <div className="relative z-10 flex-1 flex flex-col items-center justify-center px-6 py-12 text-center" style={{transform:'translateY(-20%)'}}>
            <h1 style={{fontFamily:"'Instrument Serif',serif",fontSize:'clamp(3.5rem,9vw,9rem)',color:'white',letterSpacing:'-0.03em',whiteSpace:'nowrap',lineHeight:1,marginBottom:'2rem',fontWeight:400}}>
              Know it then <em>all</em>.
            </h1>

            <div className="max-w-xl w-full mb-6">
              <div className="liquid-glass rounded-full pl-6 pr-2 py-2 flex items-center gap-3">
                <input
                  type="email"
                  placeholder="Enter your email"
                  style={{flex:1,background:'transparent',color:'white',border:'none',outline:'none',fontSize:'0.875rem'}}
                  className="placeholder-white/40"
                />
                <button
                  style={{background:'white',border:'none',borderRadius:'9999px',padding:'0.75rem',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}
                  className="hover:bg-white/90 transition-colors"
                >
                  <ArrowRight size={20} color="black" />
                </button>
              </div>
            </div>

            <p style={{color:'rgba(255,255,255,0.7)',fontSize:'0.875rem',lineHeight:'1.6',padding:'0 1rem',maxWidth:'28rem',marginBottom:'2rem'}}>
              Stay updated with the latest news and insights. Subscribe to our newsletter today and never miss out on exciting updates.
            </p>

            <button className="liquid-glass rounded-full px-8 py-3 text-white text-sm font-medium hover:bg-white/5 transition-colors" style={{border:'none',cursor:'pointer',color:'white'}}>
              Read our Manifesto
            </button>
          </div>

          {/* Social icons */}
          <div className="relative z-10 flex justify-center gap-4 pb-12">
            {[Instagram, Twitter, Globe].map((Icon, i) => (
              <button key={`social-${i}`} className="liquid-glass rounded-full p-4 hover:bg-white/5 transition-all" style={{border:'none',cursor:'pointer',color:'rgba(255,255,255,0.8)',display:'flex'}}>
                <Icon size={20} />
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ─────────────── ABOUT ─────────────── */
    function AboutSection() {
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, margin: '-100px' });

      return (
        <section
          ref={ref}
          className="pt-32 md:pt-44 pb-10 md:pb-14 px-6 overflow-hidden"
          style={{background:'radial-gradient(ellipse at top, rgba(255,255,255,0.03) 0%, transparent 70%), #000'}}
        >
          <div className="max-w-6xl mx-auto">
            <motion.p
              initial={{opacity:0,y:20}}
              animate={isInView?{opacity:1,y:0}:{}}
              transition={{duration:0.6}}
              style={{color:'rgba(255,255,255,0.4)',fontSize:'0.75rem',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'1.5rem'}}
            >
              About Us
            </motion.p>

            <motion.h2
              initial={{opacity:0,y:40}}
              animate={isInView?{opacity:1,y:0}:{}}
              transition={{duration:0.8,delay:0.1}}
              style={{fontFamily:"'Instrument Serif',serif",fontSize:'clamp(2.25rem,6vw,4.5rem)',color:'white',lineHeight:1.1,letterSpacing:'-0.03em',fontWeight:400}}
              dangerouslySetInnerHTML={{__html:`Pioneering <em style="color:rgba(255,255,255,0.6)">ideas</em> for<span class="hidden md:inline"><br></span> minds that <em style="color:rgba(255,255,255,0.6)">create, build, and inspire.</em>`}}
            />
          </div>
        </section>
      );
    }

    /* ─────────────── FEATURED VIDEO ─────────────── */
    function FeaturedVideoSection() {
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, margin: '-100px' });

      return (
        <section className="pt-6 md:pt-10 pb-20 md:pb-32 px-6 overflow-hidden" style={{background:'#000'}}>
          <div className="max-w-6xl mx-auto">
            <motion.div
              ref={ref}
              className="rounded-3xl overflow-hidden relative"
              style={{aspectRatio:'16/9'}}
              initial={{opacity:0,y:60}}
              animate={isInView?{opacity:1,y:0}:{}}
              transition={{duration:0.9}}
            >
              <video
                className="w-full h-full object-cover"
                muted autoPlay loop playsInline preload="auto"
                src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260402_054547_9875cfc5-155a-4229-8ec8-b7ba7125cbf8.mp4"
              />
              <div className="absolute inset-0" style={{background:'linear-gradient(to top, rgba(0,0,0,0.6), transparent, transparent)'}} />

              <div className="absolute bottom-0 left-0 right-0 p-6 md:p-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
                <div className="liquid-glass rounded-2xl p-6 md:p-8 max-w-md">
                  <p style={{color:'rgba(255,255,255,0.5)',fontSize:'0.7rem',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'0.75rem'}}>Our Approach</p>
                  <p style={{color:'white',fontSize:'0.9rem',lineHeight:'1.65'}}>
                    We believe in the power of curiosity-driven exploration. Every project starts with a question, and every answer opens a new door to innovation.
                  </p>
                </div>
                <motion.button
                  className="liquid-glass rounded-full px-8 py-3 text-white text-sm font-medium self-start md:self-auto"
                  style={{border:'none',cursor:'pointer',color:'white'}}
                  whileHover={{scale:1.05}}
                  whileTap={{scale:0.95}}
                >
                  Explore more
                </motion.button>
              </div>
            </motion.div>
          </div>
        </section>
      );
    }

    /* ─────────────── PHILOSOPHY ─────────────── */
    function PhilosophySection() {
      const headRef = useRef(null);
      const headInView = useInView(headRef, { once: true, margin: '-100px' });
      const leftRef = useRef(null);
      const leftInView = useInView(leftRef, { once: true, margin: '-100px' });
      const rightRef = useRef(null);
      const rightInView = useInView(rightRef, { once: true, margin: '-100px' });

      return (
        <section className="py-28 md:py-40 px-6 overflow-hidden" style={{background:'#000'}}>
          <div className="max-w-6xl mx-auto">
            <motion.h2
              ref={headRef}
              initial={{opacity:0,y:40}}
              animate={headInView?{opacity:1,y:0}:{}}
              transition={{duration:0.8}}
              className="mb-16 md:mb-24"
              style={{fontFamily:"'Instrument Serif',serif",fontSize:'clamp(3rem,8vw,6rem)',color:'white',letterSpacing:'-0.03em',fontWeight:400}}
            >
              Innovation{' '}
              <em style={{color:'rgba(255,255,255,0.4)'}}>x</em>{' '}
              Vision
            </motion.h2>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12">
              <motion.div
                ref={leftRef}
                className="rounded-3xl overflow-hidden"
                style={{aspectRatio:'4/3'}}
                initial={{opacity:0,x:-40}}
                animate={leftInView?{opacity:1,x:0}:{}}
                transition={{duration:0.8}}
              >
                <video
                  className="w-full h-full object-cover"
                  muted autoPlay loop playsInline preload="auto"
                  src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4"
                />
              </motion.div>

              <motion.div
                ref={rightRef}
                className="flex flex-col justify-center"
                style={{gap:'2rem'}}
                initial={{opacity:0,x:40}}
                animate={rightInView?{opacity:1,x:0}:{}}
                transition={{duration:0.8}}
              >
                <div>
                  <p style={{color:'rgba(255,255,255,0.4)',fontSize:'0.7rem',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'1rem'}}>Choose your space</p>
                  <p style={{color:'rgba(255,255,255,0.7)',fontSize:'1rem',lineHeight:'1.7'}}>
                    Every meaningful breakthrough begins at the intersection of disciplined strategy and remarkable creative vision. We operate at that crossroads, turning bold thinking into tangible outcomes that move people and reshape industries.
                  </p>
                </div>
                <div style={{width:'100%',height:'1px',background:'rgba(255,255,255,0.1)'}} />
                <div>
                  <p style={{color:'rgba(255,255,255,0.4)',fontSize:'0.7rem',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'1rem'}}>Shape the future</p>
                  <p style={{color:'rgba(255,255,255,0.7)',fontSize:'1rem',lineHeight:'1.7'}}>
                    We believe that the best work emerges when curiosity meets conviction. Our process is designed to uncover hidden opportunities and translate them into experiences that resonate long after the first impression.
                  </p>
                </div>
              </motion.div>
            </div>
          </div>
        </section>
      );
    }

    /* ─────────────── SERVICES ─────────────── */
    function ServicesSection() {
      const ref = useRef(null);
      const isInView = useInView(ref, { once: true, margin: '-100px' });

      const cards = [
        {
          video: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260314_131748_f2ca2a28-fed7-44c8-b9a9-bd9acdd5ec31.mp4",
          tag: "Strategy",
          title: "Research & Insight",
          description: "We dig deep into data, culture, and human behavior to surface the insights that drive meaningful, lasting change."
        },
        {
          video: "https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260324_151826_c7218672-6e92-402c-9e45-f1e0f454bdc4.mp4",
          tag: "Craft",
          title: "Design & Execution",
          description: "From concept to launch, we obsess over every detail to deliver experiences that feel effortless and look extraordinary."
        }
      ];

      return (
        <section
          className="py-28 md:py-40 px-6 overflow-hidden"
          style={{background:'radial-gradient(ellipse at center, rgba(255,255,255,0.02) 0%, transparent 60%), #000'}}
        >
          <div className="max-w-6xl mx-auto">
            <motion.div
              ref={ref}
              className="flex items-end justify-between mb-16 md:mb-20"
              initial={{opacity:0,y:30}}
              animate={isInView?{opacity:1,y:0}:{}}
              transition={{duration:0.7}}
            >
              <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:'clamp(2rem,5vw,3.5rem)',color:'white',letterSpacing:'-0.03em',fontWeight:400,margin:0}}>
                What we do
              </h2>
              <p className="hidden md:block" style={{color:'rgba(255,255,255,0.4)',fontSize:'0.875rem',margin:0}}>Our services</p>
            </motion.div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-8">
              {cards.map((card, i) => (
                <ServiceCard key={i} card={card} i={i} isInView={isInView} />
              ))}
            </div>
          </div>
        </section>
      );
    }

    function ServiceCard({ card, i, isInView }) {
      const [hovered, setHovered] = useState(false);
      return (
        <motion.div
          className="liquid-glass rounded-3xl overflow-hidden"
          initial={{opacity:0,y:50}}
          animate={isInView?{opacity:1,y:0}:{}}
          transition={{duration:0.8,delay:i*0.15}}
          onMouseEnter={()=>setHovered(true)}
          onMouseLeave={()=>setHovered(false)}
        >
          <div className="relative overflow-hidden" style={{aspectRatio:'16/9'}}>
            <video
              className="w-full h-full object-cover"
              style={{transform:hovered?'scale(1.05)':'scale(1)',transition:'transform 700ms ease'}}
              muted autoPlay loop playsInline preload="auto"
              src={card.video}
            />
            <div className="absolute inset-0" style={{background:'linear-gradient(to top, rgba(0,0,0,0.4), transparent)'}} />
          </div>
          <div className="p-6 md:p-8">
            <div className="flex items-center justify-between mb-4">
              <span style={{color:'rgba(255,255,255,0.4)',fontSize:'0.7rem',letterSpacing:'0.2em',textTransform:'uppercase'}}>{card.tag}</span>
              <div className="liquid-glass rounded-full p-2" style={{display:'flex'}}>
                <ArrowUpRight size={16} color="white" />
              </div>
            </div>
            <h3 style={{fontFamily:"'Instrument Serif',serif",fontSize:'1.4rem',color:'white',letterSpacing:'-0.02em',marginBottom:'0.75rem',fontWeight:400}}>
              {card.title}
            </h3>
            <p style={{color:'rgba(255,255,255,0.5)',fontSize:'0.875rem',lineHeight:'1.65',margin:0}}>
              {card.description}
            </p>
          </div>
        </motion.div>
      );
    }

    /* ─────────────── APP ─────────────── */
    function App() {
      return (
        <div style={{background:'#000'}}>
          <Hero />
          <AboutSection />
          <FeaturedVideoSection />
          <PhilosophySection />
          <ServicesSection />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
