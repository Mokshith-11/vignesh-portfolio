  /* ── Fade hook ── */
  function useFadeVideo(videoRef) {
    useEffect(() => {
      const video = videoRef.current;
      if (!video) return;
      video.style.opacity = 0;
      let fadeOutDone = false;

      function rAFfade(from, to, dur, done) {
        let start = null;
        function step(ts) {
          if (!start) start = ts;
          const p = Math.min((ts - start) / dur, 1);
          video.style.opacity = from + (to - from) * p;
          if (p < 1) requestAnimationFrame(step);
          else done && done();
        }
        requestAnimationFrame(step);
      }

      const onCanPlay = () => { video.play().catch(()=>{}); rAFfade(0, 1, 500); };
      const onTimeUpdate = () => {
        if (!video.duration) return;
        const rem = video.duration - video.currentTime;
        if (rem <= 0.55 && !fadeOutDone) {
          fadeOutDone = true;
          rAFfade(parseFloat(video.style.opacity)||1, 0, 500);
        }
      };
      const onEnded = () => {
        fadeOutDone = false;
        video.style.opacity = 0;
        setTimeout(() => { video.currentTime = 0; video.play().catch(()=>{}); rAFfade(0, 1, 500); }, 100);
      };

      video.addEventListener('canplay', onCanPlay);
      video.addEventListener('timeupdate', onTimeUpdate);
      video.addEventListener('ended', onEnded);
      return () => {
        video.removeEventListener('canplay', onCanPlay);
        video.removeEventListener('timeupdate', onTimeUpdate);
        video.removeEventListener('ended', onEnded);
      };
    }, []);
  }

  /* ── Reveal wrapper (CSS-based, no framer-motion list warning) ── */
  function Reveal({ children, delay = 0, x = 0, y = 40 }) {
    const ref = useRef(null);
    const [visible, setVisible] = useState(false);
    useEffect(() => {
      const el = ref.current;
      if (!el) return;
      const obs = new IntersectionObserver(([entry]) => {
        if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
      }, { rootMargin: '-80px' });
      obs.observe(el);
      return () => obs.disconnect();
    }, []);
    return (
      <div ref={ref} style={{
        opacity: visible ? 1 : 0,
        transform: visible ? 'none' : `translate(${x}px, ${y}px)`,
        transition: `opacity 0.8s cubic-bezier(0.22,1,0.36,1) ${delay}s, transform 0.8s cubic-bezier(0.22,1,0.36,1) ${delay}s`
      }}>
        {children}
      </div>
    );
  }

  /* ── Interactive Particle Background (Canvas 2D — reliable cross-browser) ── */
  function ThreeBackground() {
    const containerRef = useRef(null);

    useEffect(() => {
      const container = containerRef.current;
      if (!container) return;

      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block;z-index:0;pointer-events:none;';
      container.appendChild(canvas);

      let W = container.clientWidth || window.innerWidth;
      let H = container.clientHeight || window.innerHeight;
      canvas.width = W * window.devicePixelRatio;
      canvas.height = H * window.devicePixelRatio;
      const ctx = canvas.getContext('2d');
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

      // State
      let mouseX = W / 2, mouseY = H / 2;
      let scrollProg = 0, targetScroll = 0;

      const COUNT = 90;
      const pts = Array.from({ length: COUNT }, () => ({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
        r: 1.5 + Math.random() * 1.5,
      }));

      // Floating shapes (projected 3D wireframes as 2D polygons)
      const SHAPES = [
        { cx: W*0.75, cy: H*0.3, r: 60, sides: 6, rot: 0, rSpeed: 0.008 },
        { cx: W*0.2,  cy: H*0.6, r: 45, sides: 8, rot: 1, rSpeed: -0.006 },
        { cx: W*0.85, cy: H*0.7, r: 35, sides: 5, rot: 2, rSpeed: 0.01 },
        { cx: W*0.1,  cy: H*0.2, r: 28, sides: 3, rot: 0.5, rSpeed: -0.012 },
      ];

      const onMouseMove = (e) => { mouseX = e.clientX; mouseY = e.clientY; };
      const onScroll = () => {
        const max = document.body.scrollHeight - window.innerHeight;
        targetScroll = Math.min(window.scrollY / Math.max(max, 1), 1);
      };
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('scroll', onScroll, { passive: true });

      let raf;
      function draw() {
        raf = requestAnimationFrame(draw);
        scrollProg += (targetScroll - scrollProg) * 0.05;

        ctx.clearRect(0, 0, W, H);

        const speed = 1 + scrollProg * 3;
        const maxDist = 120 + scrollProg * 80;
        const REPEL = 80;

        // Update particles
        for (const p of pts) {
          p.x += p.vx * speed;
          p.y += p.vy * speed;
          if (p.x < 0 || p.x > W) p.vx *= -1;
          if (p.y < 0 || p.y > H) p.vy *= -1;

          // Repel from mouse
          const dx = p.x - mouseX, dy = p.y - mouseY;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < REPEL && d > 1) {
            p.x += (dx/d) * (REPEL-d) * 0.04;
            p.y += (dy/d) * (REPEL-d) * 0.04;
          }
        }

        // Draw connections
        for (let i = 0; i < pts.length; i++) {
          for (let j = i+1; j < pts.length; j++) {
            const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
            const d = Math.sqrt(dx*dx+dy*dy);
            if (d < maxDist) {
              const alpha = (1 - d/maxDist) * (0.25 + scrollProg * 0.2);
              ctx.beginPath();
              ctx.moveTo(pts[i].x, pts[i].y);
              ctx.lineTo(pts[j].x, pts[j].y);
              ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
              ctx.lineWidth = 0.8;
              ctx.stroke();
            }
          }
        }

        // Draw particles
        for (const p of pts) {
          const glow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
          glow.addColorStop(0, 'rgba(255,255,255,0.9)');
          glow.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI*2);
          ctx.fillStyle = glow;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ctx.fill();
        }

        // Draw wireframe shapes
        for (const s of SHAPES) {
          s.rot += s.rSpeed * (1 + scrollProg * 2);
          const op = 0.12 + scrollProg * 0.1;
          ctx.strokeStyle = `rgba(255,255,255,${op})`;
          ctx.lineWidth = 1;
          // Outer polygon
          ctx.beginPath();
          for (let k = 0; k <= s.sides; k++) {
            const a = s.rot + (k/s.sides)*Math.PI*2;
            const x = s.cx + Math.cos(a)*s.r;
            const y = s.cy + Math.sin(a)*s.r;
            k===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
          }
          ctx.stroke();
          // Inner spokes
          for (let k = 0; k < s.sides; k+=2) {
            const a = s.rot + (k/s.sides)*Math.PI*2;
            ctx.beginPath();
            ctx.moveTo(s.cx, s.cy);
            ctx.lineTo(s.cx+Math.cos(a)*s.r, s.cy+Math.sin(a)*s.r);
            ctx.stroke();
          }
        }

        // Mouse orb
        const orbAlpha = 0.15 - scrollProg * 0.1;
        if (orbAlpha > 0) {
          const orbGrad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 40);
          orbGrad.addColorStop(0, `rgba(255,255,255,${orbAlpha})`);
          orbGrad.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.beginPath();
          ctx.arc(mouseX, mouseY, 40, 0, Math.PI*2);
          ctx.fillStyle = orbGrad;
          ctx.fill();
        }
      }
      draw();

      const onResize = () => {
        W = container.clientWidth || window.innerWidth;
        H = container.clientHeight || window.innerHeight;
        canvas.width = W * window.devicePixelRatio;
        canvas.height = H * window.devicePixelRatio;
        ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        // Reposition shapes
        SHAPES[0].cx=W*0.75; SHAPES[0].cy=H*0.3;
        SHAPES[1].cx=W*0.2;  SHAPES[1].cy=H*0.6;
        SHAPES[2].cx=W*0.85; SHAPES[2].cy=H*0.7;
        SHAPES[3].cx=W*0.1;  SHAPES[3].cy=H*0.2;
      };
      window.addEventListener('resize', onResize);

      return () => {
        cancelAnimationFrame(raf);
        window.removeEventListener('mousemove', onMouseMove);
        window.removeEventListener('scroll', onScroll);
        window.removeEventListener('resize', onResize);
        if (canvas.parentNode) canvas.parentNode.removeChild(canvas);
      };
    }, []);

    return <div ref={containerRef} style={{ position: 'absolute', inset: 0, zIndex: 0 }} />;
  }

  /* ── Project Canvas (themed 3D per project) ── */
  function ProjectCanvas({ sceneType, hovered }) {
    const canvasRef = useRef(null);
    const stateRef = useRef({ mouseX: 0, mouseY: 0 });

    useEffect(() => { stateRef.current.hovered = hovered; }, [hovered]);

    useEffect(() => {
      const canvas = canvasRef.current;
      if (!canvas || !window.THREE) return;
      const THREE = window.THREE;
      const container = canvas.parentElement;
      let W = container.clientWidth, H = container.clientHeight;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(52, W / H, 0.1, 100);
      camera.position.z = 8;

      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setSize(W, H);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      let updater = null;

      /* ── AUDIO: waveform bars + pulse ring (AudioGuard) ── */
      if (sceneType === 'audio') {
        const BAR = 42;
        const bars = [];
        for (let i = 0; i < BAR; i++) {
          const geo = new THREE.BoxGeometry(0.17, 1, 0.17);
          const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 });
          const m = new THREE.Mesh(geo, mat);
          m.position.x = (i - BAR / 2) * 0.27;
          scene.add(m);
          bars.push({ mesh: m, phase: Math.random() * Math.PI * 2, freq: 0.4 + Math.random() * 2 });
        }
        const PCNT = 64;
        const ppos = new Float32Array(PCNT * 3);
        const pGeo = new THREE.BufferGeometry();
        pGeo.setAttribute('position', new THREE.BufferAttribute(ppos, 3));
        scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.07, transparent: true, opacity: 0.45 })));
        updater = (t) => {
          const k = stateRef.current.hovered ? 1.6 : 1;
          bars.forEach(({ mesh, phase, freq }) => {
            const h = (0.15 + Math.abs(Math.sin(t * 0.0012 * freq + phase)) * 2.8) * k;
            mesh.scale.y = h; mesh.position.y = h / 2 - 1.3;
          });
          for (let i = 0; i < PCNT; i++) {
            const a = (i / PCNT) * Math.PI * 2;
            const r = 2.8 + Math.sin(t * 0.002 + a * 4) * 0.5 * k;
            ppos[i * 3] = Math.cos(a) * r; ppos[i * 3 + 1] = Math.sin(a) * r; ppos[i * 3 + 2] = 0;
          }
          pGeo.attributes.position.needsUpdate = true;
          camera.position.x += (stateRef.current.mouseX * 2 - camera.position.x) * 0.05;
          camera.position.y += (stateRef.current.mouseY * 1.2 - camera.position.y) * 0.05;
          camera.lookAt(0, 0, 0);
        };
      }

      /* ── NETWORK: node graph (NexusForge) ── */
      else if (sceneType === 'network') {
        const N = 35;
        const pos = new Float32Array(N * 3);
        const vel = [];
        for (let i = 0; i < N; i++) {
          pos[i*3]=(Math.random()-0.5)*10; pos[i*3+1]=(Math.random()-0.5)*6; pos[i*3+2]=(Math.random()-0.5)*4;
          vel.push({x:(Math.random()-0.5)*0.014,y:(Math.random()-0.5)*0.014,z:(Math.random()-0.5)*0.007});
        }
        const ptGeo = new THREE.BufferGeometry();
        ptGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        scene.add(new THREE.Points(ptGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.14, transparent: true, opacity: 0.9 })));
        const lBuf = new Float32Array(N * N * 6);
        const lGeo = new THREE.BufferGeometry();
        lGeo.setAttribute('position', new THREE.BufferAttribute(lBuf, 3));
        scene.add(new THREE.LineSegments(lGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.12 })));
        const core = new THREE.Mesh(new THREE.IcosahedronGeometry(0.7, 2),
          new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.18 }));
        scene.add(core);
        updater = (t) => {
          const sp = stateRef.current.hovered ? 1.7 : 1;
          const mx = stateRef.current.mouseX * 5, my = stateRef.current.mouseY * 3;
          for (let i = 0; i < N; i++) {
            pos[i*3]+=vel[i].x*sp; pos[i*3+1]+=vel[i].y*sp; pos[i*3+2]+=vel[i].z*sp;
            if (Math.abs(pos[i*3])>5) vel[i].x*=-1;
            if (Math.abs(pos[i*3+1])>3) vel[i].y*=-1;
            if (Math.abs(pos[i*3+2])>2) vel[i].z*=-1;
            const dx=mx-pos[i*3], dy=my-pos[i*3+1], d=Math.sqrt(dx*dx+dy*dy);
            if (d<3){ pos[i*3]+=dx*0.003; pos[i*3+1]+=dy*0.003; }
          }
          ptGeo.attributes.position.needsUpdate = true;
          let li=0;
          for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) {
            const dx=pos[i*3]-pos[j*3],dy=pos[i*3+1]-pos[j*3+1],dz=pos[i*3+2]-pos[j*3+2];
            if (dx*dx+dy*dy+dz*dz<18){lBuf[li++]=pos[i*3];lBuf[li++]=pos[i*3+1];lBuf[li++]=pos[i*3+2];lBuf[li++]=pos[j*3];lBuf[li++]=pos[j*3+1];lBuf[li++]=pos[j*3+2];}
          }
          lGeo.setDrawRange(0,li/3); lGeo.attributes.position.needsUpdate=true;
          core.rotation.x+=0.008*sp; core.rotation.y+=0.012*sp;
        };
      }

      /* ── DNA helix (Hospital) ── */
      else if (sceneType === 'dna') {
        const SEG = 70, TURNS = 3;
        for (let i = 0; i < SEG; i++) {
          const t0 = (i / SEG) * TURNS * Math.PI * 2;
          const y = (i / SEG) * 9 - 4.5;
          const r = 1.6;
          [0, Math.PI].forEach((offset, si) => {
            const m = new THREE.Mesh(
              new THREE.SphereGeometry(0.09, 8, 8),
              new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: si===0?0.9:0.55 })
            );
            m.position.set(Math.cos(t0+offset)*r, y, Math.sin(t0+offset)*r);
            scene.add(m);
          });
          if (i % 5 === 0) {
            const rg = new THREE.Mesh(
              new THREE.CylinderGeometry(0.03, 0.03, r*2, 6),
              new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.22 })
            );
            rg.position.set(0, y, 0);
            rg.rotation.z = Math.PI / 2; rg.rotation.x = t0;
            scene.add(rg);
          }
        }
        updater = (t) => {
          const sp = stateRef.current.hovered ? 1.4 : 0.7;
          scene.rotation.y = t * 0.001 * sp + stateRef.current.mouseX * 0.6;
          scene.rotation.x = stateRef.current.mouseY * 0.25;
        };
      }

      /* ── EQUALIZER: rotating cubes grid (Spotify/Netflix) ── */
      else if (sceneType === 'equalizer') {
        const COLS=12, ROWS=7;
        const cubes = [];
        for (let c=0;c<COLS;c++) for (let r=0;r<ROWS;r++) {
          const m = new THREE.Mesh(
            new THREE.BoxGeometry(0.38, 0.38, 0.38),
            new THREE.MeshBasicMaterial({ color:0xffffff, wireframe:true, transparent:true, opacity:0.12+Math.random()*0.25 })
          );
          m.position.set((c-COLS/2)*0.58,(r-ROWS/2)*0.58,0);
          scene.add(m);
          cubes.push({ mesh:m, phase:Math.random()*Math.PI*2, c });
        }
        updater = (t) => {
          const sp = stateRef.current.hovered ? 1.8 : 1;
          cubes.forEach(({mesh,phase,c})=>{
            mesh.rotation.x+=0.009*sp; mesh.rotation.y+=0.007*sp;
            const p=Math.sin(t*0.002*sp+phase+c*0.4)*0.5;
            mesh.material.opacity=0.07+Math.max(0,p)*0.55;
            mesh.scale.setScalar(0.8+Math.max(0,p)*0.5);
          });
          scene.rotation.y+=(-stateRef.current.mouseX*0.35-scene.rotation.y)*0.05;
          scene.rotation.x+=(-stateRef.current.mouseY*0.2-scene.rotation.x)*0.05;
        };
      }

      /* ── BLOOM: mandala particles (Sri Krishna Bhavan) ── */
      else if (sceneType === 'bloom') {
        const CNT=130;
        const pos = new Float32Array(CNT*3), ori = new Float32Array(CNT*3);
        const vel2 = [];
        for (let i=0;i<CNT;i++){
          const a=(i/CNT)*Math.PI*2*(Math.floor(i/20)+1);
          const rr=0.8+(i%6)*0.7;
          const x=Math.cos(a)*rr, y=Math.sin(a)*rr, z=(Math.random()-0.5)*1.5;
          pos[i*3]=ori[i*3]=x; pos[i*3+1]=ori[i*3+1]=y; pos[i*3+2]=ori[i*3+2]=z;
          vel2.push({ phase:Math.random()*Math.PI*2, speed:0.4+Math.random()*0.8 });
        }
        const ptGeo2 = new THREE.BufferGeometry();
        ptGeo2.setAttribute('position', new THREE.BufferAttribute(pos,3));
        scene.add(new THREE.Points(ptGeo2, new THREE.PointsMaterial({color:0xffffff,size:0.09,transparent:true,opacity:0.82})));
        for (let r=1;r<=4;r++){
          const rg=new THREE.Mesh(new THREE.RingGeometry(r*0.85,r*0.85+0.025,72),
            new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.07,side:THREE.DoubleSide}));
          scene.add(rg);
        }
        updater = (t)=>{
          const sp=stateRef.current.hovered?1.6:1;
          for (let i=0;i<CNT;i++){
            const w=Math.sin(t*0.0012*vel2[i].speed+vel2[i].phase)*0.35*sp;
            pos[i*3]=ori[i*3]+Math.cos(vel2[i].phase+t*0.0004)*w;
            pos[i*3+1]=ori[i*3+1]+Math.sin(vel2[i].phase+t*0.0004)*w;
          }
          ptGeo2.attributes.position.needsUpdate=true;
          scene.rotation.z+=0.003*sp;
          camera.position.x+=(stateRef.current.mouseX*2-camera.position.x)*0.05;
          camera.position.y+=(stateRef.current.mouseY*1.5-camera.position.y)*0.05;
          camera.lookAt(0,0,0);
        };
      }

      const onMM = (e) => {
        const rect=container.getBoundingClientRect();
        stateRef.current.mouseX=((e.clientX-rect.left)/W)*2-1;
        stateRef.current.mouseY=-(((e.clientY-rect.top)/H)*2-1);
      };
      container.addEventListener('mousemove', onMM);

      let raf2;
      function loop(t){ raf2=requestAnimationFrame(loop); if(updater)updater(t); renderer.render(scene,camera); }
      requestAnimationFrame(loop);

      const onResize2=()=>{ W=container.clientWidth;H=container.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H); };
      window.addEventListener('resize',onResize2);
      return ()=>{ cancelAnimationFrame(raf2);container.removeEventListener('mousemove',onMM);window.removeEventListener('resize',onResize2);renderer.dispose(); };
    }, [sceneType]);

    return <canvas ref={canvasRef} style={{ width:'100%', height:'100%', display:'block' }} />;
  }
